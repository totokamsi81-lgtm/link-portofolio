<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Link Media Sosial</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 40px;
        }
        .foto-profil {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            object-fit: cover; /* Agar foto tidak gepeng */
        }
        h1 { font-size: 24px; margin-bottom: 5px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 30px; }
        
        .tombol-link {
            display: block;
            background: #ffffff;
            color: #121212;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
            /* KODE BARU: Memberikan bayangan halus awal pada tombol */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .tombol-link:hover {
            background: #00adb5;
            color: white;
            /* KODE BARU: Membuat tombol agak naik ke atas */
            transform: translateY(-3px); 
            /* KODE BARU: Membuat bayangan di bawah tombol jadi lebih tebal & menyebar saat melayang */
            box-shadow: 0 8px 25px rgba(0, 173, 181, 0.4); 
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://picsum.photos/100" class="foto-profil" alt="Foto Profil">
        
        <h1>Nama Kamu / Nama Bisnis</h1>
        <p>Tuliskan deskripsi singkat atau sloganmu di sini.</p>

        <a href="https://www.instagram.com/" class="tombol-link" target="_blank">Kunjungi Toko Online</a>
        <a href="https://wa.me/628123456789" class="tombol-link" target="_blank">Hubungi via WhatsApp</a>
        <a href="https://www.youtube.com" class="tombol-link" target="_blank">Lihat Katalog Video</a>
    </div>

</body>
</html>
